name: Generate Diagram PNGs

on:
  push:
    paths:
      - 'docs/diagrams/*.excalidraw'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pngs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Export Excalidraw to PNG
        uses: hkusu/excalidraw-to-png-action@v1
        with:
          input: 'docs/diagrams/*.excalidraw'
          output-dir: 'docs/diagrams'
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push PNG files
        run: |
          git add docs/diagrams/*.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: generate PNG exports from Excalidraw diagrams [skip version]"
            git push
          fi
